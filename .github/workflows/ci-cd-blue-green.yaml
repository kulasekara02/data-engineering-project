name: CI-CD Blue-Green

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: data-engineering-project
  TARGET_COLOR: green  # change to blue/green to switch target

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps (for basic checks)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build image
        id: build
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          docker build -t $IMAGE .

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push image
        run: docker push $IMAGE

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config

      - name: Apply K8s manifests (blue/green skeleton)
        run: |
          kubectl apply -f k8s/deployment-blue.yaml
          kubectl apply -f k8s/deployment-green.yaml
          kubectl apply -f k8s/service.yaml

      - name: Update target deployment image
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: |
          echo "Deploying color: ${{ env.TARGET_COLOR }} with image: $IMAGE"
          kubectl set image deployment/data-api-${{ env.TARGET_COLOR }} data-api=$IMAGE
          kubectl rollout status deployment/data-api-${{ env.TARGET_COLOR }}

      - name: Switch service to target color
        run: |
          kubectl patch service data-api -p '{"spec": {"selector": {"app": "data-api", "track": "'${{ env.TARGET_COLOR }}'"}}}'

      - name: Show current pods
        run: kubectl get pods -o wide
